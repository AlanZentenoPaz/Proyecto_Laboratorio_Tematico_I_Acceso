<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dar de Baja Alumno - UAM Cuajimalpa</title>
    <link rel="stylesheet" href="/css/admin-styles.css">
</head>
<body>
<div class="container container-large">
    <div class="header">
        <div class="logo">
            <div class="logo-img">
                <img src="https://www.comunicacionsocial.uam.mx/identidaduam/images/el-emblema.jpg" alt="Logo UAM">
            </div>
            <div class="logo-text">
                Universidad Autónoma Metropolitana<br>
                <span>Unidad Cuajimalpa</span>
            </div>
        </div>
        <div class="datetime">
            <div class="date" id="current-date"></div>
            <div class="time" id="current-time"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="bitacora-container">
            <div class="bitacora-header">
                <h1 class="bitacora-title">🗑️ Dar de Baja Alumno</h1>
                <button class="btn btn-back btn-small" onclick="window.location.href='dashboard.html'">
                    ← Volver al Dashboard
                </button>
            </div>

            <div id="message-box" class="message-box"></div>

            <!-- Sección de búsqueda de alumno -->
            <div class="search-alumno-section" id="search-section">
                <h3>🔍 Buscar Alumno para Dar de Baja</h3>
                <div class="search-box">
                    <div class="form-group">
                        <label>Ingrese la matrícula del alumno:</label>
                        <input type="text" id="matricula-buscar" placeholder="Ej: 223456789">
                    </div>
                    <button class="btn btn-buscar" onclick="buscarAlumnoBaja()">Buscar Alumno</button>
                </div>
            </div>

            <!-- Contenedor para la información del alumno y formulario de baja -->
            <div id="form-container" style="display: none;"></div>
        </div>
    </div>
</div>

<script src="/js/admin-script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const adminGuardado = sessionStorage.getItem('adminActual');
        if (!adminGuardado) {
            window.location.href = 'login.html';
            return;
        }
    });
</script>
</body>
</html>
