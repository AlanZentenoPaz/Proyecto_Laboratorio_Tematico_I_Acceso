<!-- reportes-tecnicos.html actualizado -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes Técnicos - UAM Cuajimalpa</title>
    <link rel="stylesheet" href="/css/admin-styles.css">
</head>
<body>
<div class="container container-large">
    <div class="header">
        <div class="logo">
            <div class="logo-img">
                <img src="https://www.comunicacionsocial.uam.mx/identidaduam/images/el-emblema.jpg" alt="Logo UAM">
            </div>
            <div class="logo-text">
                Universidad Autónoma Metropolitana<br>
                <span>Unidad Cuajimalpa</span>
            </div>
        </div>
        <div class="datetime">
            <div class="date" id="current-date"></div>
            <div class="time" id="current-time"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="bitacora-container">
            <div class="bitacora-header">
                <h1 class="bitacora-title">Reportes Técnicos</h1>
                <button class="btn btn-back btn-small" onclick="window.location.href='dashboard.html'">
                    ← Volver al Dashboard
                </button>
            </div>

            <div id="message-box" class="message-box"></div>

            <!-- Contenedor para reportes -->
            <div id="reportes-container"></div>
        </div>
    </div>
</div>

<!-- Modal para confirmar atención de reporte -->
<div id="modal-atender" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📋 Confirmar Atención de Reporte</h3>
            <span class="modal-close" onclick="cerrarModal()">&times;</span>
        </div>
        <div class="modal-body">
            <p>¿Está seguro de que desea marcar este reporte como atendido?</p>
            <p style="margin-top: 10px; color: #666; font-size: 14px;">Esta acción eliminará el reporte de la base de datos y quedará registrado en la bitácora.</p>
            <div id="reporte-info-modal" style="margin-top: 15px; padding: 10px; background: #f5f5f5; border-radius: 5px;">
                <!-- Información del reporte se cargará aquí -->
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary btn-small" onclick="cerrarModal()">Cancelar</button>
            <button class="btn btn-success btn-small" id="btn-confirmar-atender">Confirmar Atención</button>
        </div>
    </div>
</div>

<script src="/js/admin-script.js"></script>
<script>
    // Verificar autenticación y cargar reportes al iniciar la página
    document.addEventListener('DOMContentLoaded', function() {
        // Verificar que el administrador esté autenticado
        const adminGuardado = sessionStorage.getItem('adminActual');
        if (!adminGuardado) {
            window.location.href = 'login.html';
            return;
        }

        // Cargar los reportes técnicos
        if (typeof cargarReportesTecnicos === 'function') {
            cargarReportesTecnicos();
        } else {
            console.error('La función cargarReportesTecnicos no está definida');
            const container = document.getElementById('reportes-container');
            if (container) {
                container.innerHTML = `
                        <div class="no-reportes">
                            <div class="icon">⚠️</div>
                            <p>Error al cargar la página. Por favor, recargue la página.</p>
                            <button class="btn btn-primary btn-small" onclick="location.reload()" style="margin-top: 15px;">Recargar</button>
                        </div>
                    `;
            }
        }
    });
</script>
</body>
</html>
