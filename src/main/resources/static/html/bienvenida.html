<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Acceso - UAM Cuajimalpa</title>
    <link rel="stylesheet" href="/css/alumno-styles.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <div class="logo-img">
                <img src="https://www.comunicacionsocial.uam.mx/identidaduam/images/el-emblema.jpg" alt="Logo UAM Cuajimalpa">
            </div>
            <div class="logo-text">
                Universidad Autónoma Metropolitana<br>
                <span>Unidad Cuajimalpa</span>
            </div>
        </div>
        <div class="datetime">
            <div class="date" id="current-date"></div>
            <div class="time" id="current-time"></div>
        </div>
    </div>

    <div class="main-content">
        <h1 class="welcome-title">Sistema de Acceso Automatizado – UAM Cuajimalpa</h1>
        <p class="subtitle">Por favor seleccione qué acción desea realizar</p>

        <div class="button-group">
            <a href="ingresar.html" class="btn btn-primary">Ingresar a la unidad</a>
            <a href="salir.html" class="btn btn-danger">Salir de la unidad</a>
        </div>

        <div class="button-group">
            <a href="reporte-tecnico.html" class="btn btn-warning">Reportar problema técnico</a>
        </div>
    </div>
</div>

<script src="/js/alumno-script.js"></script>

</html>
